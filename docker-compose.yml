version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fsm_postgres
    environment:
      POSTGRES_USER: fsm_user
      POSTGRES_PASSWORD: fsm_password
      POSTGRES_DB: fsm_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fsm_user -d fsm_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: fsm_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fsm_backend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:
